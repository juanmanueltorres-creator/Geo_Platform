<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>GeoPlatform Drillholes</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
}

#map{
height:100vh;
}

</style>

</head>


<body>

<div id="map"></div>

<script>

// crear mapa
const map = L.map('map').setView([-31.534, -68.536], 12)

// capa base
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map)


// pedir datos a la API
fetch("http://127.0.0.1:8000/geospatial/drillhole-locations")

.then(function(response){

return response.json()

})

.then(function(data){

console.log(data)

// crear capa geojson
const drillholes = L.geoJSON(data,{

pointToLayer: function(feature,latlng){

return L.circleMarker(latlng,{
radius:6,
color:"#000",
weight:1,
fillColor:"#ff7800",
fillOpacity:0.9
})

},

onEachFeature:function(feature,layer){

layer.bindPopup(
"<b>Drillhole:</b> "+feature.properties.drillhole
)

}

}).addTo(map)

map.fitBounds(drillholes.getBounds())

})

.catch(function(error){

console.log("Error:",error)

})

</script>

</body>

</html>
